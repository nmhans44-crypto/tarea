<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas - Sabores de España</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <nav class="nav">
    <div class="brand">🍷 Sabores de España</div>
    <button class="menu-btn" id="menu-btn">☰</button>

    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="menu.html">Menú</a></li>
      <li><a href="reservas.html" id="auth-link">Mi cuenta</a></li>
      <li><a href="nosotros.html">Nosotros</a></li>
      <li><a href="contacto.html">Contacto</a></li>
      <li><a href="admin.html" id="admin-link" class="hidden">Admin</a></li>
      <li><button id="logout-btn">Salir</button></li>
    </ul>
  </nav>
</header>

<main>
  <h1 class="section-title">Reservar mesa</h1>
  <p id="user-info"></p>

  <div class="grid grid-2">

    <!-- FORMULARIO -->
    <section class="card">
      <h2>Nueva reserva</h2>

      <!-- 🔥 IMPORTANTE: ESTE ID -->
      <form id="reserva-form" class="form">
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="date" id="fecha" required>
        <input type="time" id="hora" required>
        <input type="number" id="personas" min="1" max="20" placeholder="Número de personas" required>
        <textarea id="nota" rows="4" placeholder="Nota adicional"></textarea>
        <button class="btn" type="submit">Reservar</button>
      </form>

      <div id="message" class="notice"></div>
    </section>

    <!-- TABLA -->
    <section class="card">
      <h2>Mis reservas en tiempo real</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Personas</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="reservas-list"></tbody>
        </table>
      </div>
    </section>

  </div>

  <!-- 🔥 MESAS (NO ROMPE FIREBASE) -->
  <section class="card">
    <h2>Mesas disponibles</h2>

    <div id="mesas">
      <div class="mesa libre">1</div>
      <div class="mesa libre">2</div>
      <div class="mesa libre">3</div>
      <div class="mesa libre">4</div>
      <div class="mesa libre">5</div>
      <div class="mesa libre">6</div>
    </div>
  </section>

</main>

<footer>
  <p>📞 Contáctanos: 5618504578</p>
  <p>© 2026 Sabores de España</p>
</footer>

<script type="module" src="js/reservas.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
