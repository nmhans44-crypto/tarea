<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sabores de España</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <nav class="nav">
      <div class="brand">🍷 Sabores de España</div>
      <button class="menu-btn" id="menu-btn">☰</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="menu.html">Menú</a></li>
        <li><a href="reservas.html" id="auth-link">Login</a></li>
        <li><a href="nosotros.html">Nosotros</a></li>
        <li><a href="contacto.html">Contacto</a></li>
        <li><a href="admin.html" id="admin-link" class="hidden">Admin</a></li>
        <li><button id="logout-btn">Salir</button></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1 class="section-title">Iniciar sesión</h1>

    <div class="card" style="max-width:520px;">
      <div class="form">
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button class="btn" id="login-btn" type="button">Entrar</button>
        <button class="btn" id="register-btn" type="button">Registrarse</button>
        <div id="message" class="notice">Usa tu correo y contraseña para entrar.</div>
      </div>
    </div>
  </main>

  <footer>© 2026 Sabores de España</footer>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
